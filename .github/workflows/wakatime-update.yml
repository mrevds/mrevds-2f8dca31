name: Update WakaTime Data

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 02:00 UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-wakatime:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to commit back
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history to enable proper commits
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check WAKA_KEY secret
        id: key_check
        env:
          WAKA_KEY: ${{ secrets.WAKA_KEY }}
        run: |
          if [ -z "$WAKA_KEY" ]; then
            echo "::error::WAKA_KEY secret is NOT set! Go to Settings → Secrets and variables → Actions and add it."
            exit 1
          fi
          echo "WAKA_KEY is set (starts with: ${WAKA_KEY:0:8}...)"

      - name: Run WakaTime fetch script
        id: fetch
        env:
          WAKA_KEY: ${{ secrets.WAKA_KEY }}
        run: |
          node scripts/fetch-wakatime.mjs

      - name: Check for changes
        id: git_check
        run: |
          if git diff --quiet src/data/wakatime.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git_check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/wakatime.json
          git commit -m "chore: update WakaTime data ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git push